services:

  # Laravel App
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jobhub_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - vendor:/var/www/vendor
      - node_modules:/var/www/node_modules
      - public_build:/var/www/public/build
      - storage:/var/www/storage
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
    networks:
      - jobhub_network
    depends_on:
      db:
        condition: service_healthy

  # Nginx Web Server
  nginx:
    image: nginx:alpine
    container_name: jobhub_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www:ro
      - public_build:/var/www/public/build:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - jobhub_network
    depends_on:
      - app

  # MySQL Database
  db:
    image: mysql:8.0
    container_name: jobhub_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: jobhub
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: secret
      MYSQL_USER: jobhub
    ports:
      - "3306:3306"
    volumes:
      - jobhub_db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - jobhub_network

  # phpMyAdmin (untuk lihat database)
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: jobhub_phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root
    networks:
      - jobhub_network
    depends_on:
      - db

networks:
  jobhub_network:
    driver: bridge

volumes:
  jobhub_db:
    driver: local
  vendor:
    driver: local
  node_modules:
    driver: local
  public_build:
    driver: local
  storage:
    driver: local
